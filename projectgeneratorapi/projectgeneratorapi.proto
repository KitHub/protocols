syntax = "proto3";

package projectgeneratorapi;

import "mwitkow/go-proto-validators/validator.proto";
import "google/api/annotations.proto";

option go_package = "./;projectgeneratorapi";

service ProjectGeneratorAPI {
    rpc GenerateProject(GenerateProjectRequest) returns (GenerateProjectResponse) {
        option (google.api.http) = {
            post: "/projects/generate"
            body: "*"
        };
    };
}

message GenerateProjectRequestComponent {
    string name = 1 [(validator.field) = {length_gt: 0, length_lt: 51}];
    string version = 2 [(validator.field) = {length_gt: 0, length_lt: 21}];
}

message GenerateProjectRequestDependency {
    string name = 1 [(validator.field) = {length_gt: 0, length_lt: 51}];
    string version = 2 [(validator.field) = {length_gt: 0, length_lt: 21}];
}

message GenerateProjectRequest {
    string project_name = 1 [(validator.field) = {length_gt: 0, length_lt: 31}];
    string project_description = 2 [(validator.field) = {length_gt: 0, length_lt: 501}];
    string project_app_name = 3 [(validator.field) = {length_gt: 0, length_lt: 31, regex: "^[a-zA-Z][a-zA-Z0-9_]*$"}];
    string project_server_name = 4 [(validator.field) = {length_gt: 0, length_lt: 31, regex: "^[a-zA-Z][a-zA-Z0-9_]*$"}];
    string project_language = 5 [(validator.field) = {length_gt: 0, length_lt: 31}];
    string project_language_version = 6 [(validator.field) = {length_gt: 0, length_lt: 31}];
    repeated GenerateProjectRequestDependency project_dependencies = 7;
    repeated GenerateProjectRequestComponent project_components = 8;
}

message GenerateProjectResponseData {

}

message GenerateProjectResponse {
    int32 err_code = 1;
    string err_msg = 2;
    GenerateProjectResponseData data = 3;
}
