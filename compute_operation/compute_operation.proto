syntax = "proto3";

package compute_operation;

option go_package = "./;compute_operation";

// 条件运算数据结构 ================================================

message LogicCompute {
    // 条件运算符枚举
    enum LogicOp {
        LOGIC_OP_UNSPECIFIED = 0;
        LOGIC_OP_AND = 1;
        LOGIC_OP_OR = 2;
    }

    // 条件运算比较运算符枚举
    enum CompareOp {
        COMPARE_OP_UNSPECIFIED = 0;   // unspecified
        COMPARE_OP_EQ = 1;            // =
        COMPARE_OP_NEQ = 2;           // !=
        COMPARE_OP_GT = 3;            // >
        COMPARE_OP_GTE = 4;           // >=
        COMPARE_OP_LT = 5;            // <
        COMPARE_OP_LTE = 6;           // <=
        COMPARE_OP_LIKE = 7;          // like
        COMPARE_OP_NOT_LIKE = 8;      // not like
        COMPARE_OP_IN = 9;            // in
        COMPARE_OP_NOT_IN = 10;       // not in
        COMPARE_OP_IS_NULL = 11;      // is null
        COMPARE_OP_IS_NOT_NULL = 12;  // is not null
    }

    // 条件运算逻辑节点：AND/OR 分组节点
    message LogicNode {
        LogicOp logic = 1;
        repeated ConditionNode children = 2;
    }

    // 字段条件叶子节点
    message FieldConditionNode {
        string field = 1;
        CompareOp operator = 2;
        string value = 3;
        string table_alias = 5;
    }

    // 条件节点总结构：oneof 实现两种节点互斥（替代Go接口多态）
    message ConditionNode {
        // 当前节点是否取反 NOT
        bool not = 1;

        // 二选一：要么是逻辑组，要么是单条件
        oneof node {
            LogicNode logic_node = 2;
            FieldConditionNode condition_node = 3;
        }
    }
}

// 集合运算数据结构 ================================================

message SetCompute {
    // 节点类型
    enum NodeType {
        NODE_TYPE_UNSPECIFIED = 0;  // 未指定
        DATASET = 1;                // 叶子节点：原始数据集
        OPERATOR = 2;               // 运算节点：并交差补
    }

    // 集合运算枚举
    enum Operator {
        OPERATOR_UNSPECIFIED = 0;   // 未指定
        UNION = 1;                  // 并集
        INTERSECT = 2;              // 交集
        DIFF = 3;                   // 左差集 A-B
        COMPLEMENT = 4;             // 补集
    }

    // 运算树节点
    message Node {
        NodeType node_type = 1;
        Operator operator = 2;       // node_type为dataset时无需填充此值
        string set_key = 3;               // node_type为operator时无需填充此值
        repeated Node children = 4;  // node_type为operator时需要填充此值
    }
}