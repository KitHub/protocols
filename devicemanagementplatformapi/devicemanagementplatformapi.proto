syntax = "proto3";

package devicemanagementplatformapi;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";

option go_package = "./;devicemanagementplatformapi";

message DeviceInfo {
    int64 device_id = 1;
    string device_no = 2;
    int64 register_time = 3;
}

service DeviceManagementPlatformAPI {
    rpc QueryDeviceByNo(QueryDeviceByNoRequest) returns (QueryDeviceByNoResponse) {
        option (google.api.http) = {
            get: "/devices/getDeviceByNo"
        };
    };
    rpc QueryDeviceById(QueryDeviceByIdRequest) returns (QueryDeviceByIdResponse) {
        option (google.api.http) = {
            get: "/devices/getDeviceById"
        };
    };
    rpc RegisterDevice(RegisterDeviceRequest) returns (RegisterDeviceResponse) {
        option (google.api.http) = {
            post: "/devices/register"
            body: "*"
        };
    };
}

message QueryDeviceByNoRequest {
    string device_no = 1 [(buf.validate.field).string.min_len = 1, (buf.validate.field).string.max_len = 100];
}

message QueryDeviceByNoResponseData {
    DeviceInfo device_info = 1;
}

message QueryDeviceByNoResponse {
    int32 err_code = 1;
    string err_msg = 2;
    QueryDeviceByNoResponseData data = 3;
}

message QueryDeviceByIdRequest {
    int64 device_id = 1 [(buf.validate.field).int64.gte = 0];
}

message QueryDeviceByIdResponseData {
    DeviceInfo device_info = 1;
}

message QueryDeviceByIdResponse {
    int32 err_code = 1;
    string err_msg = 2;
    QueryDeviceByIdResponseData data = 3;
}

message RegisterDeviceRequest {
    string device_no = 1 [(buf.validate.field).string.min_len = 1, (buf.validate.field).string.max_len = 100];
}

message RegisterDeviceResponseData {
    DeviceInfo device_info = 1;
}

message RegisterDeviceResponse {
    int32 err_code = 1;
    string err_msg = 2;
    RegisterDeviceResponseData data = 3;
}

