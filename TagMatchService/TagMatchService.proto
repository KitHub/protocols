syntax = "proto3";

package TagMatchService;

import "mwitkow/go-proto-validators/validator.proto";
import "google/api/annotations.proto";

option go_package = "github.com/KitHub/protocols/TagMatchService;TagMatchService";

service TagMatchServiceAPI {
  rpc MatchEntites(MatchEntitesRequest) returns (MatchEntitesResponse) {
    option (google.api.http) = {
      get: "/v1/tagmatch/entites/match"
    };
  }

  rpc AddEntities(AddEntitiesRequest) returns (AddEntitiesResponse) {
    option (google.api.http) = {
        post: "/v1/tagmatch/entites/add"
        body: "*"
    };
  }
}

message EntityTag {
    string tag = 1 [(validator.field) = {length_gt: 1, length_lt: 64}];
    string value = 2 [(validator.field) = {length_gt: 1, length_lt: 64}];
}

message AddEntitesRequestEntity {
    int64 entity_id = 1 [(validator.field) = {int_gt: 0}];
    repeated EntityTag tags = 2 [(validator.field) = {length_gt: 1, length_lt: 64, repeated_count_min: 1, repeated_count_max: 10}];
}

message AddEntitiesRequest {
    int64 project_id = 1 [(validator.field) = {int_gt: 0}];
    repeated AddEntitesRequestEntity data = 2 [(validator.field) = {repeated_count_min: 1, repeated_count_max: 50}];
}

message AddEntitiesResponseData {
}

message AddEntitiesResponse {
    int32 err_code = 1;
    string err_msg = 2;
    AddEntitiesResponseData data = 3;
}

message MatchEntitesRequest {
    int64 project_id = 1 [(validator.field) = {int_gt: 0}];
    repeated EntityTag tags = 2 [(validator.field) = {repeated_count_min: 1, repeated_count_max: 50}];
}

message MatchEntitesResponseData {
    repeated string entity_ids = 1;
}

message MatchEntitesResponse {
    int32 err_code = 1;
    string err_msg = 2;
    MatchEntitesResponseData data = 3;
}