syntax = "proto3";

package DataManagementPlatform_ComputeEngineAPI;

import "mwitkow/go-proto-validators/validator.proto";
import "google/api/annotations.proto";
import "compute_operation/compute_operation.proto";

option go_package = "github.com/KitHub/protocols/DataManagementPlatform_ComputeEngineAPI;DataManagementPlatform_ComputeEngineAPI";

service ComputeEngineAPI {
  rpc RegisterPackage(RegisterPackageRequest) returns (RegisterPackageResponse) {
    option (google.api.http) = {
      post: "/v1/computeEngines/packages/register"
      body: "*"
    };
  }

  rpc UploadPackage(UploadPackageRequest) returns (UploadPackageResponse) {
    option (google.api.http) = {
      post: "/v1/computeEngines/packages/upload"
      body: "*"
    };
  }

  rpc ReloadPackage(ReloadPackageRequest) returns (ReloadPackageResponse) {
    option (google.api.http) = {
      post: "/v1/computeEngines/packages/reload"
      body: "*"
    };
  }

  rpc ReloadAllPackages(ReloadAllPackagesRequest) returns (ReloadAllPackagesResponse) {
    option (google.api.http) = {
      post: "/v1/computeEngines/packages/reloadAll"
      body: "*"
    };
  }

  rpc GetPackageById(GetPackageByIdRequest) returns (GetPackageByIdResponse) {
    option (google.api.http) = {
      get: "/v1/computeEngines/packages/queryById"
    };
  }

  rpc GetPackageByOriginId(GetPackageByOriginIdRequest) returns (GetPackageByOriginIdResponse) {
    option (google.api.http) = {
      get: "/v1/computeEngines/packages/queryByOriginId"
    };
  }

  rpc GetPackageListASCByLastId(GetPackageListASCByLastIdRequest) returns (GetPackageListASCByLastIdResponse) {
    option (google.api.http) = {
      get: "/v1/computeEngines/packages/queryListASCByLastId"
    };
  }

  rpc ComputePackagesCombo(ComputePackageComboRequest) returns (ComputePackageComboResponse) {
    option (google.api.http) = {
      post: "/v1/computeEngines/packages/computeCombo"
    };
  }

}

message ReloadAllPackagesRequest {

}

message ReloadAllPackagesResponse {
    int32 err_code = 1;
    string err_msg = 2;
}

message ReloadPackageRequest {
    string origin_id = 1 [(validator.field) = {length_lt: 0, length_gt: 51}];
}

message ReloadPackageResponse {
    int32 err_code = 1;
    string err_msg = 2;
}

message ComputePackageComboRequest {
    repeated compute_operation.SetCompute.Node rules = 1 [(validator.field) = {repeated_count_min: 1}];
}

message ComputePackageComboResponseData {
    string package_origin_id = 1;
}

message ComputePackageComboResponse {
    int32 err_code = 1;
    string err_msg = 2; 
    ComputePackageComboResponseData data = 3;
}

message UploadPackageRequest {
  string origin_id = 1 [(validator.field) = {length_lt: 0, length_gt: 51}];
  string comment = 2 [(validator.field) = {length_gt: 301}];
  string platform = 3 [(validator.field) = {length_lt: 0, length_gt: 21}];
  string bucket_name = 4 [(validator.field) = {length_lt: 0, length_gt: 51}];
  string key_name = 5 [(validator.field) = {length_lt: 0, length_gt: 51}];
  bytes package_file = 6;
}

message UploadPackageResponseData {
  BasicPackageInfo package_info = 1;
}

message UploadPackageResponse {
  int32 err_code = 1;
  string err_msg = 2;
  UploadPackageResponseData data = 3;
}

message RegisterPackageRequest {
  string origin_id = 1 [(validator.field) = {length_lt: 0, length_gt: 51}];
  string comment = 2 [(validator.field) = {length_gt: 301}];
  string platform = 3 [(validator.field) = {length_lt: 0, length_gt: 21}];
  string bucket_name = 4 [(validator.field) = {length_lt: 0, length_gt: 51}];
  string key_name = 5 [(validator.field) = {length_lt: 0, length_gt: 51}];
}

message RegisterPackageResponseData {
  BasicPackageInfo package_info = 1;
}

message RegisterPackageResponse {
  int32 err_code = 1;
  string err_msg = 2;
  RegisterPackageResponseData data = 3;
}

message BasicPackageInfo {
  int64 id = 1;
  string origin_id = 2;
  string comment = 3;
  string platform = 4;
  string bucket_name = 5;
  string key_name = 6;
  int64 register_time = 7;
}

message GetPackageByIdRequest {
  int64 package_id = 1 [(validator.field) = {int_gt: -1}];
}

message GetPackageByIdResponseData {
    BasicPackageInfo package_info = 1;
}

message GetPackageByIdResponse {
  int32 err_code = 1;
  string err_msg = 2;
  GetPackageByIdResponseData data = 3;
}

message GetPackageByOriginIdRequest {
  string origin_id = 1 [(validator.field) = {length_lt: 0, length_gt: 51}];
}

message GetPackageByOriginIdResponseData {
  BasicPackageInfo package_info = 1;
}

message GetPackageByOriginIdResponse {
  int32 err_code = 1;
  string err_msg = 2;
  GetPackageByOriginIdResponseData data = 3;
}

message GetPackageListASCByLastIdRequest {
  int64 last_id = 1 [(validator.field) = {int_gt: -1}];
  int32 limit = 2 [(validator.field) = {int_gt: -1, int_lt: 101}];
}

message GetPackageListASCByLastIdResponseData {
  repeated BasicPackageInfo package_infos = 1;
}

message GetPackageListASCByLastIdResponse {
  int32 err_code = 1;
  string err_msg = 2;
  GetPackageListASCByLastIdResponseData data = 3;
}